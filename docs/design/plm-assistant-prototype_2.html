<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLM Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  /* ============================================
     DESIGN TOKENS: Slate + Teal
     ============================================ */
  :root {
    --bg: #F4F5F7;
    --surface: #EBEDF0;
    --surface-elevated: #FFFFFF;
    --surface-hover: #E2E4E9;
    --surface-glass: rgba(255,255,255,0.72);
    --primary: #0D9488;
    --primary-hover: #0F766E;
    --primary-subtle: #CCFBF1;
    --accent: #6366F1;
    --text: #1E293B;
    --text-muted: #64748B;
    --text-subtle: #94A3B8;
    --border: #CBD5E1;
    --border-subtle: #E2E8F0;
    --danger: #DC2626;
    --success: #16A34A;
    --warning: #D97706;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);

    --radius: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;

    --font: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  /* ============================================
     RESET & BASE
     ============================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  /* ============================================
     LAYOUT SHELL
     ============================================ */
  .app-shell {
    display: flex;
    height: 100dvh;
    width: 100%;
    position: relative;
  }

  /* ---- Chat Panel ---- */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    transition: flex 0.3s cubic-bezier(0.165,0.85,0.45,1);
  }

  /* ---- Header ---- */
  .header {
    height: 48px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
    background: transparent;
  }
  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .user-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .user-picker:hover { background: var(--surface); }
  .user-picker .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--primary-subtle);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .user-picker svg {
    width: 14px; height: 14px;
    color: var(--text-muted);
  }

  /* ---- Message Area ---- */
  .message-area {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .message-area::-webkit-scrollbar { width: 6px; }
  .message-area::-webkit-scrollbar-track { background: transparent; }
  .message-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message-column {
    max-width: 768px;
    margin: 0 auto;
    padding: 24px 20px 16px;
  }

  /* ---- Empty State ---- */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 18vh;
    animation: fadeUp 0.5s ease both;
  }
  .empty-state h2 {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state p {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 600px;
  }
  .chip {
    padding: 8px 16px;
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip:hover {
    background: var(--surface-hover);
    border-color: rgba(13,148,136,0.3);
    color: var(--primary-hover);
  }

  /* ---- Messages ---- */
  .message { margin-bottom: 24px; animation: fadeUp 0.35s ease both; }

  .msg-user {
    display: flex;
    justify-content: flex-end;
  }
  .msg-user .bubble {
    background: #E2E4E9;
    color: var(--text);
    padding: 10px 16px;
    border-radius: 20px 20px 4px 20px;
    max-width: 85%;
    font-size: 15px;
    line-height: 1.55;
  }

  .msg-assistant .content {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }
  .msg-assistant .content strong { font-weight: 600; }
  .msg-assistant .content a {
    color: var(--primary);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .msg-assistant .content p { margin-bottom: 12px; }
  .msg-assistant .content p:last-child { margin-bottom: 0; }
  .msg-assistant .content ul {
    margin: 8px 0 12px 20px;
    list-style: disc;
  }
  .msg-assistant .content li {
    margin-bottom: 4px;
    line-height: 1.6;
  }
  .msg-assistant .content code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ---- Tool Indicators ---- */
  .tool-group {
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease both;
  }
  .tool-group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
  }
  .tool-group-header svg { width: 14px; height: 14px; transition: transform 0.2s; }
  .tool-group.collapsed .tool-group-header svg { transform: rotate(-90deg); }
  .tool-group.collapsed .tool-items { display: none; }

  .tool-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    color: var(--text-muted);
  }
  .tool-icon {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tool-icon.running { color: var(--primary); }
  .tool-icon.done { color: var(--success); }
  .tool-icon.error { color: var(--danger); }

  .tool-item .tool-time {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-subtle);
    font-family: var(--font-mono);
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ---- Streaming Dots ---- */
  .streaming-dots {
    display: flex;
    align-items: center;
    gap: 4px;
    min-height: 24px;
    padding: 8px 0;
  }
  .streaming-dots span {
    display: block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--primary);
    animation: dot-pulse 1.4s infinite ease-in-out both;
  }
  .streaming-dots span:nth-child(2) { animation-delay: 0.16s; }
  .streaming-dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ---- Confirm Action ---- */
  .confirm-block {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
    animation: fadeUp 0.3s ease both;
  }
  .confirm-block p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .confirm-actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); }

  .confirm-resolved {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    padding: 4px 0;
  }
  .confirm-resolved svg { width: 16px; height: 16px; color: var(--success); }

  /* ---- Composer ---- */
  .composer-wrap {
    padding: 8px 20px 20px;
    flex-shrink: 0;
  }
  .composer {
    max-width: 768px;
    margin: 0 auto;
    background: var(--surface-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 12px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .composer:focus-within {
    border-color: rgba(13,148,136,0.4);
    box-shadow: var(--shadow), 0 0 0 3px rgba(13,148,136,0.08);
  }
  .composer textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    background: transparent;
    line-height: 1.5;
    min-height: 24px;
    max-height: 200px;
  }
  .composer textarea::placeholder { color: var(--text-subtle); }
  .composer-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .composer-left {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
  .icon-btn svg { width: 18px; height: 18px; }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .send-btn:hover { background: var(--primary-hover); transform: scale(1.04); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn svg { width: 18px; height: 18px; }

  /* ============================================
     CONTEXT PANEL
     ============================================ */
  .context-panel {
    width: 0;
    overflow: hidden;
    background: var(--surface-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.3s cubic-bezier(0.165,0.85,0.45,1),
                opacity 0.25s ease;
    opacity: 0;
    flex-shrink: 0;
    position: relative;
    min-width: 0;
  }
  .context-panel.open {
    width: 540px;
    opacity: 1;
  }
  /* Resize handle on the left edge of the panel */
  .panel-resize-handle {
    position: absolute;
    left: -3px;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: col-resize;
    z-index: 10;
    background: transparent;
    transition: background 0.15s;
  }
  .panel-resize-handle:hover,
  .panel-resize-handle.active {
    background: var(--primary);
    opacity: 0.35;
    border-radius: 3px;
  }

  .panel-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .panel-type-badge {
    padding: 2px 10px;
    border-radius: var(--radius-full);
    background: var(--primary-subtle);
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .panel-close {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .panel-close:hover { background: var(--surface-hover); color: var(--text); }
  .panel-close svg { width: 16px; height: 16px; }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
  }
  .panel-body::-webkit-scrollbar { width: 5px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ---- Table in Panel ---- */
  .panel-table-wrap {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .panel-table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .panel-table-scroll::-webkit-scrollbar { height: 4px; }
  .panel-table-scroll::-webkit-scrollbar-track { background: transparent; }
  .panel-table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-table {
    width: 100%;
    min-width: 420px;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }
  .panel-table thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .panel-table th {
    background: var(--surface);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-subtle);
  }
  /* Column width hints */
  .panel-table .col-id { width: 68px; }
  .panel-table .col-title { width: auto; } /* takes remaining space */
  .panel-table .col-status { width: 90px; }
  .panel-table .col-meta { width: 85px; }
  .panel-table td {
    padding: 10px 14px;
    color: var(--text);
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
  }
  /* Title cells wrap instead of clip */
  .panel-table td.cell-title {
    white-space: normal;
    word-break: break-word;
    line-height: 1.4;
  }
  /* ID and meta cells stay tight */
  .panel-table td.cell-id {
    white-space: nowrap;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }
  .panel-table td.cell-meta {
    white-space: nowrap;
    color: var(--text-muted);
    font-size: 12px;
  }
  .panel-table tr:last-child td { border-bottom: none; }
  .panel-table tbody tr {
    transition: background 0.12s;
  }
  .panel-table tbody tr:hover { background: var(--surface-hover); }

  .table-footer {
    padding: 10px 16px;
    font-size: 11px;
    color: var(--text-subtle);
    border-top: 1px solid var(--border-subtle);
  }

  /* ---- Status Badges ---- */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 10px;
    border-radius: var(--radius-full);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .badge-approved { background: #D1FAE5; color: #065F46; }
  .badge-draft    { background: #FEF3C7; color: #92400E; }
  .badge-canceled { background: #F1F5F9; color: #64748B; }
  .badge-passed   { background: #D1FAE5; color: #065F46; }
  .badge-failed   { background: #FEE2E2; color: #991B1B; }
  .badge-active   { background: #CCFBF1; color: #0F766E; }
  .badge-blocked  { background: #FFEDD5; color: #9A3412; }
  .badge-pending  { background: transparent; color: #64748B; border: 1px solid #CBD5E1; }
  .badge-skipped  { background: #F1F5F9; color: #475569; }

  /* ---- Detail View in Panel ---- */
  .detail-section {
    margin-bottom: 20px;
  }
  .detail-section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-subtle);
    margin-bottom: 10px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }
  .detail-field label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .detail-field .value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .entity-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .entity-pill {
    padding: 4px 12px;
    border-radius: 6px;
    background: var(--surface);
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .entity-pill:hover {
    background: var(--surface-hover);
    border-color: rgba(13,148,136,0.25);
    color: var(--primary-hover);
  }

  /* ---- Skeleton ---- */
  .skeleton {
    border-radius: 6px;
    animation: shimmer 1.5s infinite;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
    background-size: 200% 100%;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ---- Animations ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Scroll Pill ---- */
  .scroll-pill {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    padding: 6px 18px;
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    cursor: pointer;
    display: none;
    z-index: 10;
    animation: fadeUp 0.2s ease;
  }

  /* ---- Keyboard Hint ---- */
  .kbd {
    display: inline-flex;
    align-items: center;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-subtle);
    background: var(--surface);
    line-height: 1.4;
  }

  /* ---- Responsive ---- */
  @media (max-width: 1024px) {
    .context-panel.open {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 100%;
      max-width: 540px;
      z-index: 50;
      box-shadow: var(--shadow-lg);
    }
    .panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 49;
      display: none;
    }
    .panel-backdrop.show { display: block; }
  }

  /* ---- View Switcher ---- */
  .view-tabs {
    display: flex;
    gap: 2px;
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 0;
  }
  .view-tab {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .view-tab:hover { background: var(--surface-hover); color: var(--text); }
  .view-tab.active { background: var(--primary-subtle); color: var(--primary); font-weight: 600; }

  /* Diagram area */
  .diagram-container {
    background: radial-gradient(circle, #CBD5E1 1px, transparent 1px);
    background-size: 20px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border-subtle);
    padding: 32px 24px;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .diagram-placeholder {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.8;
  }

  /* accessibility */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

// ============================================
// PANEL OPEN / CLOSE
// ============================================
function openPanel() {

}
function closePanel() {
  document.getElementById('contextPanel').classList.remove('open');

// ============================================
// MESSAGE RENDERING
// ============================================
function addUserMessage(text) {
  if (!conversationStarted) {
    document.getElementById('emptyState').style.display = 'none';
    conversationStarted = true;
  }
  const col = document.getElementById('messageColumn');
  const div = document.createElement('div');
  div.className = 'message msg-user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  col.appendChild(div);
  scrollToBottom();
}

function addStreamingIndicator() {
  const col = document.getElementById('messageColumn');
  const div = document.createElement('div');
  div.className = 'message msg-assistant';
  div.id = 'streamingMsg';
  div.innerHTML = `<div class="streaming-dots"><span></span><span></span><span></span></div>`;
  col.appendChild(div);
  scrollToBottom();
}

function addToolGroup(tools, callback) {
  const msg = document.getElementById('streamingMsg');
  if (!msg) { callback(); return; }

  const group = document.createElement('div');
  group.className = 'tool-group';
  group.innerHTML = `
    <div class="tool-group-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      Used ${tools.length} tool${tools.length > 1 ? 's' : ''}
    </div>
    <div class="tool-items"></div>`;

  // Replace streaming dots with tool group
  msg.innerHTML = '';
  msg.appendChild(group);

  const container = group.querySelector('.tool-items');
  let i = 0;

  function showTool() {
    if (i >= tools.length) {
      // All done, add streaming dots back then callback
      const dots = document.createElement('div');
      dots.className = 'streaming-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      msg.appendChild(dots);
      scrollToBottom();
      setTimeout(callback, 400);
      return;
    }

    const tool = tools[i];
    const item = document.createElement('div');
    item.className = 'tool-item';
    item.innerHTML = `
      <span class="tool-icon running"><span class="spinner"></span></span>
      <span>${tool.desc}</span>
      <span class="tool-time">—</span>`;
    container.appendChild(item);
    scrollToBottom();

    // Simulate completion
    setTimeout(() => {
      item.querySelector('.tool-icon').className = 'tool-icon done';
      item.querySelector('.tool-icon').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 6L9 17l-5-5"/></svg>`;
      item.querySelector('.tool-time').textContent = tool.time;
      i++;
      setTimeout(showTool, 200);
    }, 500 + Math.random() * 400);
  }
  showTool();
}

function addAssistantResponse(html) {
  const msg = document.getElementById('streamingMsg');
  if (!msg) return;
  msg.removeAttribute('id');

  // Remove streaming dots
  const dots = msg.querySelector('.streaming-dots');
  if (dots) dots.remove();

  const content = document.createElement('div');
  content.className = 'content';
  content.innerHTML = html;
  content.style.opacity = '0';
  content.style.transform = 'translateY(4px)';
  msg.appendChild(content);

  requestAnimationFrame(() => {
    content.style.transition = 'opacity 0.35s, transform 0.35s';
    content.style.opacity = '1';
    content.style.transform = 'translateY(0)';
  });
  scrollToBottom();
}

// ============================================
// CONFIRM BLOCK DEMO
// ============================================
function addConfirmBlock() {
  const msg = document.getElementById('streamingMsg') ||
    document.querySelector('.message.msg-assistant:last-child');
  if (!msg) return;

  const block = document.createElement('div');
  block.className = 'confirm-block';
  block.innerHTML = `
    <p>This will change PR-004 status from <strong>DRAFT</strong> to <strong>IN REVIEW</strong>. Bob Chen will be notified as the owner.</p>
    <div class="confirm-actions">
      <button class="btn btn-primary" onclick="resolveConfirm(this, true)">Accept</button>
      <button class="btn btn-ghost" onclick="resolveConfirm(this, false)">Reject</button>
    </div>`;
  msg.appendChild(block);
  scrollToBottom();
}

function resolveConfirm(btn, accepted) {
  const block = btn.closest('.confirm-block');
  if (accepted) {
    block.innerHTML = `<div class="confirm-resolved">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      PR-004 moved to IN REVIEW by Alice Garcia, ${new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}
    </div>`;
  } else {
    block.innerHTML = `<div class="confirm-resolved" style="color:var(--text-subtle)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text-subtle)"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Action canceled
    </div>`;
  }
}

// ============================================
// SEND LOGIC
// ============================================
function handleSend() {
  const input = document.getElementById('composerInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
}

function sendChip(el) {
  sendMessage(el.textContent.trim());
}

function sendMessage(text) {
  addUserMessage(text);

  const conv = conversations[text];
  if (conv) {
    addStreamingIndicator();
    setTimeout(() => {
      addToolGroup(conv.tools, () => {
        addAssistantResponse(conv.response);
        if (conv.panel) {
          setTimeout(() => renderPanel(conv.panel), 300);
        }
      });
    }, 300);
  }
  // Special: "Show me PR-004" or similar detail trigger
  else if (text.toLowerCase().includes('pr-004') || text.toLowerCase().includes('cry playback') || text.toLowerCase().includes('audio system')) {
    addStreamingIndicator();
    setTimeout(() => {
      addToolGroup([
        { name: "getProductRequirement", desc: "Fetching PR-004 details...", time: "68ms" },
        { name: "showEntityDetail", desc: "Rendering detail view", time: "22ms" },
      ], () => {
        addAssistantResponse(`<p>Here are the full details for <strong>PR-004 Audio System (Cry Playback)</strong>. It's currently in <span class="badge badge-draft" style="font-size:10px">DRAFT</span> status, owned by Bob Chen on the Electrical team.</p>
<p>The requirement targets field-grade audio quality with 40dB signal-to-noise ratio. There's one associated test case (<code>TC-004</code>) that hasn't been executed yet.</p>
<p>Would you like me to move this to review status?</p>`);
        setTimeout(() => {
          renderPanel('detail');
          // Add confirm block after a beat
          setTimeout(addConfirmBlock, 800);
        }, 300);
      });
    }, 300);
  }
  else {
    // Generic fallback
    addStreamingIndicator();
    setTimeout(() => {
      const dots = document.getElementById('streamingMsg')?.querySelector('.streaming-dots');
      if (dots) dots.remove();
      addAssistantResponse(`<p>I can help you with that. Try asking me to show requirements, test cases, traceability diagrams, or audit logs. You can also ask me to create or update specific records.</p>
<p>For example: "Show all requirements" or "What's untested?"</p>`);
    }, 800);
  }
}

// ============================================
// UTILITIES
// ============================================
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function scrollToBottom() {
  const area = document.getElementById('messageArea');
  requestAnimationFrame(() => {
    area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function cycleUser() {
  currentUser = (currentUser + 1) % users.length;
  document.getElementById('userName').textContent = users[currentUser].name;
  document.getElementById('userAvatar').textContent = users[currentUser].initials;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Cmd+K: focus composer
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('composerInput').focus();
  }
  // Escape: close panel
  if (e.key === 'Escape' && panelOpen) {
    closePanel();
  }
  // Cmd+\: toggle panel
  if ((e.metaKey || e.ctrlKey) && e.key === '\\') {
    e.preventDefault();
    if (panelOpen) closePanel();
    else { renderPanel('table-requirements'); }
  }
});

// ============================================
// PANEL RESIZE (drag handle)
// ============================================
(function() {
  const handle = document.getElementById('panelResizeHandle');
  const panel = document.getElementById('contextPanel');
  let dragging = false;
  let startX = 0;
  let startW = 0;
  const MIN_W = 360;
  const MAX_W = 800;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('active');
    panel.style.transition = 'none'; // disable transition while dragging
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    // Panel grows to the left, so moving mouse left = wider
    const delta = startX - e.clientX;
    const newW = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
    panel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // Re-enable transition for future open/close
    setTimeout(() => {
      panel.style.transition = '';
    }, 50);
  });
})();
</script>
